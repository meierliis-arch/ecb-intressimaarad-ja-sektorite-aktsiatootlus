# ECB intressimäärad ja sektorite aktsiatootlus — Airflow + dbt + Superset stack
#
# Teenused:
#   analytics-db          — peamine PostgreSQL analüütika andmebaas (port 55432)
#   airflow-db            — Airflow metaandmebaas (sisemine, ei ole väliselt ligipääsetav)
#   airflow-init          — ühekordne initsialiseerimine + dbt seed esimese käivituse jaoks
#   airflow-apiserver     — Airflow UI ja REST API (port 8080)
#   airflow-scheduler     — DAG-ide käivitamine ajakava järgi
#   airflow-dag-processor — DAG-faile parsib ja registreerib
#   superset-db           — Superset metaandmebaas (sisemine)
#   superset-init         — Superset ühekordne initsialiseerimine (migratsioonid + admin)
#   superset              — Superset näidikulaud (port 8088)
#
# Käivitamine:
#   cp .env.example .env
#   # Muuda .env failis SUPERSET_SECRET_KEY:
#   #   python -c "import secrets; print(secrets.token_hex(32))"
#   docker compose up -d --build
#
# Airflow:  http://localhost:8080  (kasutaja: airflow / parool: airflow)
# Superset: http://localhost:8088  (kasutaja: vt .env SUPERSET_ADMIN_USER)

x-airflow-common:
  &airflow-common
  image: apache/airflow:3.1.8
  env_file:
    - .env
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_USER:-airflow}:${AIRFLOW_PASSWORD:-airflow}@airflow-db:5432/${AIRFLOW_DB:-airflow}
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-apiserver:8080/execution/'
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET:-airflow_jwt_secret}
    AIRFLOW__API_AUTH__JWT_ISSUER: ${AIRFLOW__API_AUTH__JWT_ISSUER:-airflow}
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    # Andmebaasi ühendus PostgresHook jaoks (kasutab connection id "analytics_db")
    AIRFLOW_CONN_ANALYTICS_DB: postgresql://${POSTGRES_USER:-praktikum}:${POSTGRES_PASSWORD:-praktikum}@analytics-db:5432/${POSTGRES_DB:-praktikum}
    # dbt profiilide keskkonnamuutujad
    POSTGRES_HOST: analytics-db
    POSTGRES_PORT: "5432"
    POSTGRES_USER: ${POSTGRES_USER:-praktikum}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-praktikum}
    POSTGRES_DB: ${POSTGRES_DB:-praktikum}
    # Pip-paketid, mis installitakse Airflow konteinerisse käivitamisel
    # dbt-postgres: transformatsioonid; yfinance + pandas: indeksite hindade tõmbamine
    _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS:-dbt-core==1.10.22 dbt-postgres==1.10.0 yfinance==0.2.55 pandas==2.2.3 requests==2.32.3 curl_cffi==0.7.4}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - airflow-logs:/opt/airflow/logs
    - ./dbt_project:/opt/airflow/dbt_project
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    &airflow-common-depends-on
    airflow-db:
      condition: service_healthy
    analytics-db:
      condition: service_healthy

services:

  # ---------------------------------------------------------------------------
  # Peamine analüütika andmebaas
  # pgDuckDB toetab nii PostgreSQL kui ka DuckDB päringuid (nt PIVOT, analytikad)
  # ./init kaustas olevad SQL-failid käivituvad ainult esimesel korral (tühi DB)
  # ---------------------------------------------------------------------------
  analytics-db:
    image: pgduckdb/pgduckdb:18-v1.1.1
    container_name: ecb-analytics-db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-praktikum}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-praktikum}
      POSTGRES_DB: ${POSTGRES_DB:-praktikum}
    ports:
      - "${DB_PORT_HOST:-55432}:5432"
    volumes:
      - ./init:/docker-entrypoint-initdb.d   # 01_create_schemas.sql jms
      - analytics-db-volume:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-praktikum}"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  # ---------------------------------------------------------------------------
  # Airflow metaandmebaas (DAG-ide olek, logid, ühendused)
  # Eraldi andmebaas — ei sega analüütikaandmeid
  # ---------------------------------------------------------------------------
  airflow-db:
    image: postgres:16
    container_name: ecb-airflow-db
    environment:
      POSTGRES_USER: ${AIRFLOW_USER:-airflow}
      POSTGRES_PASSWORD: ${AIRFLOW_PASSWORD:-airflow}
      POSTGRES_DB: ${AIRFLOW_DB:-airflow}
    volumes:
      - airflow-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${AIRFLOW_USER:-airflow}"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  # ---------------------------------------------------------------------------
  # Airflow ühekordne initsialiseerimine
  # Käivitub ühe korra, migreerib Airflow metaandmebaasi ja loob admin kasutaja.
  # dbt seed käivitub DAG-i esimese taskina (dbt_seed) — siin pole seda vaja.
  # ---------------------------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    container_name: ecb-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/{logs,dags}
        /entrypoint airflow version
        /entrypoint airflow config list >/dev/null
        chown -R "${AIRFLOW_UID:-50000}:0" /opt/airflow/
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
      _PIP_ADDITIONAL_REQUIREMENTS: ''
    user: "0:0"
    restart: "no"

  # ---------------------------------------------------------------------------
  # Airflow API server — UI (port 8080) ja REST API
  # ---------------------------------------------------------------------------
  airflow-apiserver:
    <<: *airflow-common
    container_name: ecb-airflow-apiserver
    command: api-server
    ports:
      - "${AIRFLOW_PORT_HOST:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # ---------------------------------------------------------------------------
  # Airflow scheduler — käivitab DAG-e ajakava järgi
  # ---------------------------------------------------------------------------
  airflow-scheduler:
    <<: *airflow-common
    container_name: ecb-airflow-scheduler
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # ---------------------------------------------------------------------------
  # Airflow DAG processor — parsib dags/ kausta faile ja registreerib DAG-e
  # ---------------------------------------------------------------------------
  airflow-dag-processor:
    <<: *airflow-common
    container_name: ecb-airflow-dagproc
    command: dag-processor
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type DagProcessorJob --hostname \"$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # ---------------------------------------------------------------------------
  # Superset metaandmebaas (graafikute konfiguratsioon, kasutajad jms)
  # ---------------------------------------------------------------------------
  superset-db:
    image: postgres:16
    container_name: ecb-superset-db
    environment:
      POSTGRES_USER: ${SUPERSET_DB_USER}
      POSTGRES_PASSWORD: ${SUPERSET_DB_PASSWORD}
      POSTGRES_DB: ${SUPERSET_DB_NAME}
    volumes:
      - superset-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SUPERSET_DB_USER} -d ${SUPERSET_DB_NAME}"]
      interval: 5s
      retries: 10
    restart: always

  # ---------------------------------------------------------------------------
  # Superset ühekordne initsialiseerimine (migratsioonid + admin kasutaja)
  # ---------------------------------------------------------------------------
  superset-init:
    build:
      context: .
      dockerfile: Dockerfile.superset
    container_name: ecb-superset-init
    depends_on:
      superset-db:
        condition: service_healthy
    volumes:
      - ./superset/superset_config.py:/app/superset_config.py
      - superset-home:/app/superset_home
    environment:
      SUPERSET_CONFIG_PATH: /app/superset_config.py
      DATABASE_URI: "postgresql+psycopg2://${SUPERSET_DB_USER}:${SUPERSET_DB_PASSWORD}@superset-db:5432/${SUPERSET_DB_NAME}"
      SECRET_KEY: ${SUPERSET_SECRET_KEY}
      ADMIN_USERNAME: ${SUPERSET_ADMIN_USER}
      ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD}
      ADMIN_EMAIL: ${SUPERSET_ADMIN_EMAIL}
    command:
      - /bin/sh
      - -c
      - |
        . /app/.venv/bin/activate && \
        superset db upgrade && \
        (superset fab create-admin \
          --username $${ADMIN_USERNAME} \
          --firstname Admin --lastname User \
          --email $${ADMIN_EMAIL} \
          --password $${ADMIN_PASSWORD} || true) && \
        superset init
    restart: "no"

  # ---------------------------------------------------------------------------
  # Superset ühekordne dashboard'i import — käivitub ENNE superset serverit.
  # zip_dashboard.py ehitab ZIP-faili YAML-failidest ja asendab kohatäitjad
  # .env muutujatega — paroolid ei jõua kunagi gitti.
  # superset import-dashboards laadib selle otse Superseti andmebaasi.
  # ---------------------------------------------------------------------------
  superset-import:
    build:
      context: .
      dockerfile: Dockerfile.superset
    container_name: ecb-superset-import
    depends_on:
      superset-init:
        condition: service_completed_successfully
    volumes:
      - ./superset/superset_config.py:/app/superset_config.py
      - ./superset:/app/ecb_superset
      - superset-home:/app/superset_home
    environment:
      SUPERSET_CONFIG_PATH: /app/superset_config.py
      DATABASE_URI: "postgresql+psycopg2://${SUPERSET_DB_USER}:${SUPERSET_DB_PASSWORD}@superset-db:5432/${SUPERSET_DB_NAME}"
      SECRET_KEY: ${SUPERSET_SECRET_KEY}
      POSTGRES_USER: ${POSTGRES_USER:-praktikum}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-praktikum}
      POSTGRES_DB: ${POSTGRES_DB:-praktikum}
      POSTGRES_HOST: analytics-db
      POSTGRES_PORT: "5432"
      SUPERSET_ADMIN_USER: ${SUPERSET_ADMIN_USER:-admin}
    command:
      - /bin/sh
      - -c
      - |
        . /app/.venv/bin/activate && \
        python /app/ecb_superset/zip_dashboard.py /app/ecb_superset/dashboard_export /tmp/dashboard.zip && \
        superset import-dashboards --path /tmp/dashboard.zip --username $${SUPERSET_ADMIN_USER}
    restart: "no"

  # ---------------------------------------------------------------------------
  # Apache Superset — näidikulaud (port 8088)
  # Käivitub pärast import'i, nii et dashboard on kohe saadaval.
  # ---------------------------------------------------------------------------
  superset:
    build:
      context: .
      dockerfile: Dockerfile.superset
    container_name: ecb-superset
    depends_on:
      superset-import:
        condition: service_completed_successfully
    ports:
      - "${SUPERSET_PORT_HOST:-8088}:8088"
    volumes:
      - ./superset/superset_config.py:/app/superset_config.py
      - superset-home:/app/superset_home
    environment:
      SUPERSET_CONFIG_PATH: /app/superset_config.py
      DATABASE_URI: "postgresql+psycopg2://${SUPERSET_DB_USER}:${SUPERSET_DB_PASSWORD}@superset-db:5432/${SUPERSET_DB_NAME}"
      SECRET_KEY: ${SUPERSET_SECRET_KEY}
    command: ["/app/docker/entrypoints/run-server.sh"]
    restart: always

volumes:
  analytics-db-volume:
  airflow-db-volume:
  airflow-logs:
  superset-db-volume:
  superset-home:
